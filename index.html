很多人以为关系靠的是感情。
但其实，关系靠的是结构。

---

感情是流动的，结构才是稳定的。

你有没有想过：
为什么有些人明明很爱，却走不到最后？

因为他们只有感情，没有结构。

---

# 什么是关系中的结构？

结构就是三个东西：

• 你有没有张力（不是随时都在）
• 你有没有边界（不是无条件）
